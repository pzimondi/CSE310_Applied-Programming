<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Get Things Done</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">TaskFlow</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-link active"><span class="nav-icon">◈</span> All Tasks</a>
      <a href="/about.html" class="nav-link"><span class="nav-icon">◇</span> About</a>
    </nav>
    <!-- Live stats updated by app.js -->
    <div class="sidebar-stats">
      <div class="stat">
        <span class="stat-number" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="stat-done">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="stat-pending">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <header class="page-header">
      <div>
        <h1 class="page-title">My Tasks</h1>
        <p class="page-sub">Stay sharp. Ship things.</p>
      </div>
      <!-- Filter buttons -->
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="done">Done</button>
      </div>
    </header>

    <!-- Add Task Form -->
    <section class="add-task-section">
      <div class="add-task-card">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="What needs to be done?"
          maxlength="120"
          autocomplete="off"
        />
        <select id="priority-select" class="priority-select">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <button id="add-btn" class="add-btn">Add Task</button>
      </div>
      <p class="form-error" id="form-error" aria-live="polite"></p>
    </section>

    <!-- Task List -->
    <section class="task-list-section">
      <ul class="task-list" id="task-list"></ul>
      <div class="empty-state" id="empty-state" hidden>
        <span class="empty-icon">◎</span>
        <p>Nothing here yet.<br/>Add your first task above.</p>
      </div>
    </section>

  </main>

  <script src="/js/app.js"></script>
</body>
</html>
